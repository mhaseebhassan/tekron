services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: tekron
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tekron"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/tekron
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://web:3000
      - NEXTAUTH_URL_INTERNAL=http://web:3000
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NODE_ENV=${NODE_ENV:-production}
    command: >
      sh -c "if [ \"$$NODE_ENV\" = \"development\" ]; then
               npm run dev;
             else
               npm start;
             fi"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/session"]
      interval: 10s
      timeout: 5s
      retries: 5

  tests:
    build:
      context: ./selenium-tests
    environment:
      - BASE_URL=http://web:3000
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./selenium-tests/screenshots:/app/screenshots

volumes:
  db_data: